name: CodeQL

# Static code scanning for the Python bindings (bindings/python) and the workflow files
# themselves (the `actions` language pack catches script-injection and permission issues).
# Zig is not a CodeQL-supported language — the Zig core is covered by the test/fuzz/guard
# lanes in ci.yml instead.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 2" # Tuesday 06:00 UTC, weekly

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF results
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{ matrix.language }}"
