name: CodeQL

# Static code scanning for the Python bindings (bindings/python) and the workflow files
# themselves (the `actions` language pack catches script-injection and permission issues).
# Zig is not a CodeQL-supported language — the Zig core is covered by the test/fuzz/guard
# lanes in ci.yml instead.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 2" # Tuesday 06:00 UTC, weekly

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF results
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
